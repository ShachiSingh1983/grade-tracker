<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Grade Tracker</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
  <div class="container">
    <h1>Grade Tracker</h1>

    <!-- Input Form -->
    <div class="form-card">
      <h2>Add a Course</h2>
      <div class="form-row">
        <input type="text" id="courseName" placeholder="Course name (e.g. Signals & Systems)" />
        <input type="number" id="credits" placeholder="Credits (e.g. 3)" min="1" max="6" />
        <select id="grade">
          <option value="">Select Grade</option>
          <option value="10">O (10)</option>
          <option value="9">A+ (9)</option>
          <option value="8">A (8)</option>
          <option value="7">B+ (7)</option>
          <option value="6">B (6)</option>
          <option value="5">C (5)</option>
          <option value="4">D (4)</option>
          <option value="0">F (0)</option>
        </select>
        <button onclick="addCourse()">Add Course</button>
      </div>
    </div>

    <!-- CGPA Display -->
    <div class="stats-row">
      <div class="stat-card">
        <span class="stat-label">Current CGPA</span>
        <span class="stat-value" id="cgpaDisplay">—</span>
      </div>
      <div class="stat-card">
        <span class="stat-label">Total Credits</span>
        <span class="stat-value" id="creditsDisplay">0</span>
      </div>
    </div>

    <!-- Courses Table -->
    <div class="table-card">
      <h2>My Courses</h2>
      <table id="coursesTable">
        <thead>
          <tr>
            <th>Course</th>
            <th>Credits</th>
            <th>Grade</th>
            <th>Points</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <!-- Rows added by JavaScript -->
        </tbody>
      </table>
      <p id="emptyMsg">No courses added yet. Add your first course above.</p>
    </div>

    <!-- Predictor -->
    <div class="form-card">
      <h2>CGPA Predictor</h2>
      <p>If I get grade <select id="futureGrade">
        <option value="10">O (10)</option>
        <option value="9">A+ (9)</option>
        <option value="8">A (8)</option>
        <option value="7">B+ (7)</option>
        <option value="6">B (6)</option>
      </select> in <input type="number" id="futureCredits" placeholder="credits" min="1" max="30" style="width:80px" /> more credits,
      my CGPA will be: <strong id="predictedCgpa">—</strong></p>
      <button onclick="predict()">Calculate</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
